
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bomba matemática</title>
<style>
body { text-align:center; background:#222; color:white; font-family:Arial; }
input, button { padding:10px; font-size:18px; margin:10px; }
#operacion { font-size:30px; margin:20px; }
</style>
</head>
<body>

<h1>💣 Resuelve para desactivar</h1>
<p id="operacion"></p>
<p>Tiempo: <span id="tiempo">10</span></p>

<input id="input" placeholder="Resultado">
<button onclick="verificar()">OK</button>

<script>
// generar números
let num1 = Math.floor(Math.random() * 20 + 1);
let num2 = Math.floor(Math.random() * 20 + 1);

// elegir operación
let operaciones = ["+","-","*"];
let op = operaciones[Math.floor(Math.random() * operaciones.length)];

let resultado;

// calcular resultado
if(op === "+") resultado = num1 + num2;
if(op === "-") resultado = num1 - num2;
if(op === "*") resultado = num1 * num2;

// mostrar operación
document.getElementById("operacion").innerText = num1 + " " + op + " " + num2;

// tiempo
let tiempo = 10;

let intervalo = setInterval(() => {
    tiempo--;
    document.getElementById("tiempo").innerText = tiempo;

    if (tiempo <= 0) {
        clearInterval(intervalo);
        alert("💥 BOOM");
    }

    // efecto tensión
    if(tiempo <= 3){
        document.body.style.background = "darkred";
    }

}, 1000);

// verificar
function verificar() {
    let valor = document.getElementById("input").value;

    if (valor == resultado) {
        clearInterval(intervalo);
        alert("✅ Correcto, bomba desactivada");
    } else {
        alert("❌ Incorrecto");
    }
}
</script>

</body>
</html>

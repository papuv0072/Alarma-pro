
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Memoria bomba</title>

<style>
body {
    text-align: center;
    background: #111;
    color: white;
    font-family: Arial;
}

#secuencia {
    font-size: 40px;
    margin: 20px;
}

button {
    padding: 15px;
    margin: 10px;
    font-size: 20px;
    cursor: pointer;
}

#botones {
    display: none;
}
</style>
</head>

<body>

<h1>🧠 Memoriza la secuencia</h1>

<p id="secuencia"></p>

<div id="botones">
    <button onclick="agregar('🔴')">🔴</button>
    <button onclick="agregar('🔵')">🔵</button>
    <button onclick="agregar('🟢')">🟢</button>
    <button onclick="agregar('🟡')">🟡</button>
</div>

<script>

let colores = ["🔴","🔵","🟢","🟡"];


let secuencia = [];
for(let i = 0; i < 4; i++){
    secuencia.push(colores[Math.floor(Math.random()*colores.length)]);
}


document.getElementById("secuencia").innerText = secuencia.join(" ");

setTimeout(() => {
    document.getElementById("secuencia").innerText = "❓ ❓ ❓ ❓";
    document.getElementById("botones").style.display = "block";
}, 5000);


let respuesta = [];

function agregar(color){
    respuesta.push(color);

    if(respuesta.length === secuencia.length){
        verificar();
    }
}


function verificar(){
    if(JSON.stringify(respuesta) === JSON.stringify(secuencia)){
        alert("✅ Correcto, bomba desactivada");
    } else {
        alert("💥 BOOM");
    }
}
</script>

</body>
</html>
